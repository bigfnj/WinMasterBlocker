<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="WinMasterBlocker. Block Adobe, Autodesk and Corel from the internet using Windows Firewall.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1c"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="block" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.6" opacity="0.4"/>
    </pattern>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- diagonal accent stripe, subtle -->
  <polygon points="900,0 1280,0 1280,640 1140,640" fill="#0b1224" opacity="0.7"/>

  <!-- shield mark (right side) -->
  <g transform="translate(990,150)" filter="url(#softglow)">
    <path d="M 0 0 L 160 0 L 160 110 C 160 175 130 215 80 240 C 30 215 0 175 0 110 Z"
          fill="none" stroke="url(#accent)" stroke-width="6" stroke-linejoin="round"/>
    <!-- block slash -->
    <line x1="35" y1="60" x2="125" y2="180" stroke="url(#block)" stroke-width="14" stroke-linecap="round"/>
    <circle cx="80" cy="120" r="58" fill="none" stroke="url(#block)" stroke-width="10"/>
  </g>

  <!-- left: brand block -->
  <g transform="translate(80,180)" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif">
    <text x="0" y="0" font-size="22" font-weight="500" letter-spacing="6" fill="#22d3ee" opacity="0.95">WINDOWS FIREWALL  /  NO THIRD-PARTY TOOLS</text>

    <text x="0" y="92" font-size="86" font-weight="800" letter-spacing="-2.5" fill="#f8fafc">WinMasterBlocker</text>

    <text x="0" y="160" font-size="32" font-weight="400" fill="#cbd5e1">Block Adobe, Autodesk, Corel and Maxon from the internet.</text>

    <!-- terminal pill -->
    <g transform="translate(0,200)">
      <rect x="0" y="0" width="780" height="68" rx="10" fill="#0b1325" stroke="#1e293b" stroke-width="1"/>
      <text x="22" y="44" font-size="22" font-family="'Cascadia Code', 'JetBrains Mono', 'Consolas', ui-monospace, monospace">
        <tspan fill="#94a3b8">&gt; </tspan><tspan fill="#e2e8f0">netsh advfirewall firewall add rule </tspan><tspan fill="#fb923c" font-weight="700">action=block</tspan>
      </text>
    </g>

    <text x="0" y="332" font-size="20" font-weight="500" letter-spacing="2" fill="#64748b">github.com/ph33nx/WinMasterBlocker</text>
  </g>
</svg>
